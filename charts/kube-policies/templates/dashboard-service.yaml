{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-policies.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-policies.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: 8090
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9092
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "kube-policies.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
{{- end }}
