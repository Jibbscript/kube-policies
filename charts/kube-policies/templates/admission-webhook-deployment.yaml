{{- if .Values.admissionWebhook.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-policies.fullname" . }}-admission-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-policies.labels" . | nindent 4 }}
    app.kubernetes.io/component: admission-webhook
spec:
  replicas: {{ .Values.admissionWebhook.replicaCount }}
  selector:
    matchLabels:
      {{- include "kube-policies.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admission-webhook
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.admissionWebhook.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kube-policies.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admission-webhook
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kube-policies.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.admissionWebhook.podSecurityContext | nindent 8 }}
      containers:
        - name: admission-webhook
          securityContext:
            {{- toYaml .Values.admissionWebhook.securityContext | nindent 12 }}
          image: "{{ .Values.global.imageRegistry | default .Values.admissionWebhook.image.registry }}/{{ .Values.admissionWebhook.image.repository }}:{{ .Values.admissionWebhook.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.admissionWebhook.image.pullPolicy }}
          # Probes target the metrics server (port 9090) where /healthz and
          # /readyz are mounted. The webhook TLS port (8443) cannot serve a
          # plain-HTTP probe, so containerPort `metrics` is the only safe
          # target for httpGet.
          args:
            - --port=8443
            - --metrics-port=9090
            - --cert-path=/etc/certs/tls.crt
            - --key-path=/etc/certs/tls.key
            - --config=/etc/config/config.yaml
          ports:
            - name: webhook
              containerPort: 8443
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POLICY_MANAGER_URL
              value: "http://{{ include "kube-policies.fullname" . }}-policy-manager:8080"
            - name: POLICY_MANAGER_INTERNAL_URL
              value: "http://{{ include "kube-policies.fullname" . }}-policy-manager:8080/api/v1/decisions/internal"
            - name: POLICY_MANAGER_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kube-policies.fullname" . }}-internal-token
                  key: token
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # /readyz is not registered on the admission-webhook metrics server
          # (see cmd/admission-webhook/main.go::setupMetricsServer). Probe the
          # /healthz endpoint that IS registered. Real readiness lives behind
          # the TLS webhook server; that requires TLS-aware probing which a
          # plain httpGet cannot do.
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.admissionWebhook.resources | nindent 12 }}
          volumeMounts:
            - name: certs
              mountPath: /etc/certs
              readOnly: true
            - name: config
              mountPath: /etc/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: audit-log
              mountPath: /var/log/kube-policies
      volumes:
        - name: certs
          secret:
            secretName: {{ include "kube-policies.fullname" . }}-admission-webhook-certs
        - name: config
          configMap:
            name: {{ include "kube-policies.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        # Writable mount for the audit file backend. readOnlyRootFilesystem
        # blocks mkdir at /var/log/kube-policies on the pod's overlay; this
        # emptyDir gives the audit logger a writable directory matching the
        # default filename. For persistence beyond pod lifetime, replace
        # with a PVC.
        - name: audit-log
          emptyDir: {}
      {{- with .Values.admissionWebhook.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.admissionWebhook.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.admissionWebhook.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

