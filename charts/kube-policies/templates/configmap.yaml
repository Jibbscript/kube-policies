{{- $auditBackendType := .Values.audit.backend.type | default "stdout" -}}
{{- if not (or (eq $auditBackendType "file") (eq $auditBackendType "stdout")) -}}
{{- fail (printf "audit.backend.type=%q is not supported by the runtime; use file or stdout" $auditBackendType) -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kube-policies.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-policies.labels" . | nindent 4 }}
data:
  config.yaml: |
    policy:
      failure_mode: "fail-closed"
      disable_defaults: {{ not .Values.policies.enableDefaults }}
    audit:
      enabled: {{ .Values.audit.enabled }}
      backend: {{ $auditBackendType | quote }}
      buffer_size: {{ .Values.audit.bufferSize | default 1024 }}
      flush_interval: {{ .Values.audit.flushInterval | default "10s" | quote }}
      retention: {{ .Values.audit.retention | default "90d" | quote }}
      {{- if eq $auditBackendType "file" }}
      # Map the YAML directory `audit.backend.file.path` to a concrete
      # filename. The audit logger's createBackend reads
      # `config.filename` for the file backend.
      config:
        filename: {{ printf "%s/audit.log" (.Values.audit.backend.file.path | default "/var/log/kube-policies") | quote }}
      {{- end }}
