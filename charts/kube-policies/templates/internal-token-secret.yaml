{{- if or .Values.admissionWebhook.enabled .Values.policyManager.enabled }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-internal-token" (include "kube-policies.fullname" .)) -}}
{{- $token := "" -}}
{{- if and $existingSecret $existingSecret.data.token -}}
{{- $token = index $existingSecret.data "token" | b64dec -}}
{{- else if .Values.internalToken -}}
{{- $token = .Values.internalToken -}}
{{- else -}}
{{- $token = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kube-policies.fullname" . }}-internal-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-policies.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ $token | b64enc | quote }}
{{- end }}
