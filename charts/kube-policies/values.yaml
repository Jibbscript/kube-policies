# Default values for kube-policies
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  # Global image registry
  imageRegistry: ""
  # Global image pull secrets
  imagePullSecrets: []
  # Global storage class
  storageClass: ""

# Admission Webhook Configuration
admissionWebhook:
  enabled: true
  name: admission-webhook
  replicaCount: 2
  
  image:
    registry: docker.io
    repository: kube-policies/admission-webhook
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8443
    targetPort: 8443
    annotations: {}
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  # Pod Security Context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    fsGroup: 65534
  
  # Container Security Context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
  
  # Node selector
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Affinity
  affinity: {}
  
  # Pod annotations
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8443"
    prometheus.io/path: "/metrics"
  
  # Webhook configuration
  webhook:
    failurePolicy: Fail
    admissionReviewVersions: ["v1", "v1beta1"]
    timeoutSeconds: 10
    namespaceSelector: {}
    objectSelector: {}
  
  # TLS configuration
  tls:
    # Auto-generate certificates
    autoGenerate: true
    # Custom certificate (if autoGenerate is false)
    caCert: ""
    cert: ""
    key: ""

  # Set to true to skip loading bundled default policies at startup.
  # Useful in e2e / integration test environments where test-authored
  # policies are loaded explicitly and default policies would interfere.
  disableDefaultPolicies: false

# Policy Manager Configuration
policyManager:
  enabled: true
  name: policy-manager
  replicaCount: 1
  
  image:
    registry: docker.io
    repository: kube-policies/policy-manager
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
    annotations: {}
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  # Pod Security Context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    fsGroup: 65534
  
  # Container Security Context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
  
  # Node selector
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Affinity
  affinity: {}
  
  # Pod annotations
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"

# Policy Configuration
policies:
  # Enable default security policies
  enableDefaults: true

# RBAC Configuration
rbac:
  # Create RBAC resources
  create: true
  
  # Service account configuration
  serviceAccount:
    # Create service account
    create: true
    # Service account name (auto-generated if not specified)
    name: ""
    # Service account annotations
    annotations: {}

# Monitoring Configuration
monitoring:
  # Enable monitoring stack
  enabled: true

# Audit Configuration
audit:
  enabled: true
  bufferSize: 1000
  flushInterval: "10s"
  retention: "90d"
  
  # Audit backend configuration
  backend:
    # Backend type: file or stdout. The runtime rejects unsupported backends.
    type: file
    
    # File backend configuration.
    # The path must match the writable mount in
    # templates/admission-webhook-deployment.yaml (emptyDir at
    # /var/log/kube-policies). The audit logger appends `/audit.log`.
    file:
      path: "/var/log/kube-policies"
    
# Persistence Configuration
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

# Configuration for external dependencies
prometheus:
  enabled: false
  # Prometheus configuration when deployed as dependency
  server:
    persistentVolume:
      enabled: true
      size: 50Gi
    retention: "15d"

grafana:
  enabled: false
  # Grafana configuration when deployed as dependency
  persistence:
    enabled: true
    size: 10Gi
  adminUser: admin
  adminPassword: admin

  # Grafana datasources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://{{ include "kube-policies.fullname" . }}-prometheus-server
        access: proxy
        isDefault: true

  # Grafana dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'kube-policies'
        orgId: 1
        folder: 'Kube-Policies'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kube-policies

  dashboards:
    kube-policies:
      kube-policies-overview:
        gnetId: 12345
        revision: 1
        datasource: Prometheus

# Dashboard configuration (M1 - svelte-dashboard)
dashboard:
  # Off by default; set enabled=true to deploy the read-only Svelte SPA + Go BFF.
  enabled: false

  # Two-flag write gate: ALLOW_WRITES env is only "true" when this AND enabled are both true.
  allowWrites: false

  replicaCount: 1

  image:
    registry: ""
    repository: ghcr.io/Jibbscript/dashboard
    # Defaults to .Chart.AppVersion when empty.
    tag: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP

  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: kube-policies-dashboard.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Override the upstream policy-manager SSE URL. Empty = use the
  # in-cluster policy-manager Service via the default rendered into the
  # deployment env.
  streamURL: ""

# Shared bearer secret used by admission-webhook → policy-manager
# /api/v1/decisions/internal POSTs and as the trust anchor for the
# /api/v1/decisions/stream SSE fan-out (see svelte-dashboard plan §7).
# If empty (default), the chart auto-generates a 48-char random token
# at first install and preserves it across helm upgrades via lookup.
internalToken: ""
