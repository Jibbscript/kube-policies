# privileged-pod.yaml — Scene 3 deny target.
#
# Triggers security-baseline / no-host-path-volumes. The Rego rule emits
# "hostPath volumes are not allowed" (see examples/policies/security-baseline.yaml
# rule #2), which demo/capture/lib.sh::capture_terminals_scene3 asserts on.
#
# NOTE on choice of rule: an obvious option would be to trigger
# no-privileged-containers via `securityContext.privileged: true`. We DON'T
# because the bundled security-baseline policy *also* has a
# required-security-context rule that fires when `allowPrivilegeEscalation: true`
# (k8s defaults this field to true when `privileged: true` is set). The engine
# then collapses both violations into the aggregate "Multiple policy violations
# detected (N violations)" verdict line — which makes for a weaker demo than the
# specific single-rule message we get here. The filename is preserved for
# git-history continuity; the content matches the assertion above.
apiVersion: v1
kind: Pod
metadata:
  name: privileged-pod
  namespace: default
spec:
  volumes:
    - name: host-root
      hostPath:
        path: /tmp
  containers:
    - name: app
      image: nginx:1.27.0
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
      volumeMounts:
        - name: host-root
          mountPath: /host
