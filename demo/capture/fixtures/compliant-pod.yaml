# compliant-pod.yaml — Scene 5 montage control.
#
# Passes every rule in security-baseline.yaml:
#   - not privileged
#   - no hostPath volume
#   - explicit non-:latest image tag
#   - securityContext.runAsNonRoot=true, allowPrivilegeEscalation=false
apiVersion: v1
kind: Pod
metadata:
  name: compliant-pod
  namespace: default
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containers:
    - name: app
      image: nginx:1.27.0
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
