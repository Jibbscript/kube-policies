apiVersion: policies.kube-policies.io/v1
kind: Policy
metadata:
  name: security-baseline
  namespace: kube-policies-system
  labels:
    category: security
    severity: high
    compliance.framework: cis
    compliance.version: "1.8.0"
spec:
  description: "Basic security requirements for all workloads"
  enabled: true
  enforcement: true

  # Target resources
  match:
    - apiGroups: [""]
      apiVersions: ["v1"]
      resources: ["pods"]
    - apiGroups: ["apps"]
      apiVersions: ["v1"]
      resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]

  # Namespace selector
  namespaceSelector:
    matchExpressions:
      - key: name
        operator: NotIn
        values: ["kube-system", "kube-public", "kube-node-lease"]

  # Policy rules — authored against the kube-policies engine contract:
  #   query:  data.kube_policies.evaluate
  #   input:  the K8s object lives at input.object.* (see internal/policy.prepareInput)
  #   output: {"allowed": bool} and, when allowed=false, also {"message": str, "path": str}
  #
  # Rules use OPA v1 syntax (`import rego.v1`). When multiple potential denials
  # match (e.g. several containers violate the same rule) each rule reports the
  # lowest-indexed violation deterministically so the engine receives exactly
  # one verdict per rule and no complete-doc conflict is raised.
  rules:
    # 1. No privileged containers
    - name: no-privileged-containers
      severity: HIGH
      description: "Containers must not run in privileged mode"
      frameworks: ["CIS-1.8.0", "NIST-800-53"]
      rego: |
        package kube_policies

        import rego.v1

        default evaluate := {"allowed": true}

        evaluate := {
          "allowed": false,
          "message": "Pod must not run in privileged mode",
          "path": "spec.securityContext.privileged",
        } if {
          input.object.spec.securityContext.privileged == true
        }

        evaluate := {
          "allowed": false,
          "message": "Container must not run in privileged mode",
          "path": sprintf("spec.containers[%d].securityContext.privileged", [i]),
        } if {
          not pod_privileged
          indexes := [j |
            some j
            input.object.spec.containers[j].securityContext.privileged == true
          ]
          count(indexes) > 0
          i := indexes[0]
        }

        pod_privileged if input.object.spec.securityContext.privileged == true

    # 2. No hostPath volumes
    - name: no-host-path-volumes
      severity: HIGH
      description: "hostPath volumes are not allowed"
      frameworks: ["CIS-1.8.0"]
      rego: |
        package kube_policies

        import rego.v1

        default evaluate := {"allowed": true}

        evaluate := {
          "allowed": false,
          "message": "hostPath volumes are not allowed",
          "path": sprintf("spec.volumes[%d].hostPath", [i]),
        } if {
          indexes := [j |
            some j
            input.object.spec.volumes[j].hostPath
          ]
          count(indexes) > 0
          i := indexes[0]
        }

    # 3. No ":latest" (or implicit-latest) image tags
    - name: no-latest-image-tag
      severity: MEDIUM
      description: "Container images must not use ':latest' or an implicit latest tag"
      frameworks: ["CIS-1.8.0"]
      rego: |
        package kube_policies

        import rego.v1

        default evaluate := {"allowed": true}

        evaluate := {
          "allowed": false,
          "message": sprintf("Container image '%s' must specify an explicit non-':latest' tag", [input.object.spec.containers[i].image]),
          "path": sprintf("spec.containers[%d].image", [i]),
        } if {
          indexes := [j |
            some j
            bad_image(input.object.spec.containers[j].image)
          ]
          count(indexes) > 0
          i := indexes[0]
        }

        bad_image(image) if endswith(image, ":latest")

        bad_image(image) if not contains(image, ":")

    # 4. Required securityContext (runAsNonRoot=true, allowPrivilegeEscalation!=true)
    - name: required-security-context
      severity: MEDIUM
      description: "Containers must declare a securityContext that runs as non-root and disallows privilege escalation"
      frameworks: ["CIS-1.8.0", "PSS-restricted"]
      rego: |
        package kube_policies

        import rego.v1

        default evaluate := {"allowed": true}

        evaluate := {
          "allowed": false,
          "message": sprintf("Container at index %d must declare runAsNonRoot=true and allowPrivilegeEscalation!=true in securityContext", [i]),
          "path": sprintf("spec.containers[%d].securityContext", [i]),
        } if {
          indexes := [j |
            some j
            missing_required_sc(input.object.spec.containers[j])
          ]
          count(indexes) > 0
          i := indexes[0]
        }

        missing_required_sc(c) if not c.securityContext

        missing_required_sc(c) if not c.securityContext.runAsNonRoot

        missing_required_sc(c) if c.securityContext.runAsNonRoot == false

        missing_required_sc(c) if c.securityContext.allowPrivilegeEscalation == true

  # Exception handling
  exceptions:
    - name: system-namespaces
      description: "System namespaces are exempt from security policies"
      namespaces: ["kube-system", "kube-public", "kube-node-lease"]
      rules: ["*"]

    - name: privileged-workloads
      description: "Specific workloads that require privileged access"
      selector:
        matchLabels:
          security.policy/privileged: "true"
      rules: ["no-privileged-containers"]
      approval:
        required: true
        approvers: ["security-team"]
        duration: "30d"

  # Audit configuration
  audit:
    enabled: true
    level: "detailed"
    backends: ["file", "webhook"]

  # Metrics configuration
  metrics:
    enabled: true
    labels:
      policy: "security-baseline"
      category: "security"

# NOTE: The previous 4 non-Playground rules (no-root-user, no-host-network,
# no-host-pid, no-host-ipc, required-resource-limits) used the legacy `deny[msg]`
# contract and are non-functional under the current engine. They are deferred to
# M3 — rewrite alongside these in a single PR, or move to
# examples/policies/extras-pending-rewrite.yaml.
