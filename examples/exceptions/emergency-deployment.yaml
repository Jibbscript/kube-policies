apiVersion: policies.kube-policies.io/v1
kind: PolicyException
metadata:
  name: emergency-deployment-latest-tag
  namespace: production
  labels:
    exception.type: emergency
spec:
  description: "Temporary exception for a critical emergency deployment"
  policy_id: security-baseline
  rule_id: no-latest-image-tag
  justification: |
    Emergency deployment is required while the incident response team builds
    and promotes an immutable image tag. The exception is scoped to production
    and staging workload resources and expires automatically.
  approver: security-oncall
  expires_at: "2030-01-01T00:00:00Z"
  scope:
    namespaces:
      - production
      - staging
    resources:
      - pods
      - deployments
    groups:
      - system:serviceaccounts:production
