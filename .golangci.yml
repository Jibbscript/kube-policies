version: "2"

# Focus the linter on bug-catchers, not stylistic opinion. The v2 defaults
# (errcheck, govet, ineffassign, staticcheck, unused) plus a small set of
# real-bug detectors. Pure style/complexity linters intentionally excluded
# — `go fmt`, `goimports`, `gofumpt` already enforce formatting via the
# formatters section.
run:
  issues-exit-code: 1
  tests: true

linters:
  default: none
  enable:
    # v2 default set — these earn their keep.
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional bug-finders.
    - bodyclose
    - durationcheck
    - errorlint
    - forcetypeassert
    - gosec
    - makezero
    - misspell
    - nilerr
    - nilnil
    - noctx

  settings:
    errcheck:
      # Don't insist on checking every (*T).Method returning error; focus
      # on the common io / encoding / closer footguns.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*net/http.Response).Body.Close
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint

    govet:
      disable:
        - fieldalignment
      enable-all: true

    misspell:
      locale: US

    gosec:
      excludes:
        # Subprocess launched with variable — webhook tooling sometimes needs this.
        - G204
        # File path provided as taint input — common in test fixture paths.
        - G304

  exclusions:
    generated: lax
    rules:
      # Tests are noisier than production code; relax the strictest checks.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - noctx
          - forcetypeassert
      # Allow generated probe protobuf to escape line-length / type rules.
      - path: '.*\.pb\.go'
        linters:
          - errcheck
          - gosec
      # OPA v0 → v1 migration is tracked separately; keep the deprecation
      # warning visible at the call sites but don't fail CI on it.
      - linters:
          - staticcheck
        text: 'SA1019: "github\.com/open-policy-agent/opa/(rego|storage)'
      # k8s wait.PollImmediate is deprecated in favour of PollUntilContextTimeout;
      # the e2e framework migration is tracked separately.
      - linters:
          - staticcheck
        text: 'SA1019: wait.PollImmediate'
    paths:
      - demo/remotion/node_modules
      - third_party$
      - builtin$
      - examples$
      - test/fixtures$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Jibbscript/kube-policies
  exclusions:
    generated: lax
    paths:
      - demo/remotion/node_modules
      - third_party$
      - builtin$
      - examples$
